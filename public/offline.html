<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Sin conexión — Registruti</title>
    <style>
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f8fafc;
        color: #0f172a;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        text-align: center;
        padding: 24px;
      }
      .card {
        max-width: 320px;
      }
      .icon {
        width: 72px;
        height: 72px;
        border-radius: 20px;
        margin: 0 auto 20px;
        display: block;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 8px;
      }
      p {
        font-size: 14px;
        color: #64748b;
        margin: 0 0 24px;
        line-height: 1.5;
      }
      button {
        background: #4f46e5;
        color: #fff;
        border: 0;
        border-radius: 12px;
        padding: 12px 28px;
        font-size: 15px;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
      }
      button:active {
        transform: scale(0.97);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="icon" src="/icon-maskable-192.png" alt="Registruti" />
      <h1>Estás sin conexión</h1>
      <p>No pudimos cargar Registruti. Revisá tu conexión a internet y volvé a intentar.</p>
      <button onclick="location.reload()">Reintentar</button>
    </div>
  </body>
</html>
